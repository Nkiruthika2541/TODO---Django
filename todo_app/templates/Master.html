<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Todo Application{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  </head>
  <body>
    <div class="container mt-5 ">
      <div class="row justify-content-evenly bg-success text-white p-3">
        <div class="col">
          <div class="col-sm text-white mt-1"><a href="{% url 'home' %}" class="text-decoration-none text-light">Home</a></div>
        </div>
        <div class="col">
          <div class="col-sm mt-1"><a href="{% url 'create' %}" class="text-decoration-none text-light">Create Task</a></div>
        </div>
        <div class="col">
          <div class="col-sm mt-1"><a href="{% url 'category' %}" class="text-decoration-none text-light">Create Category</a></div>
        </div>
        <div class="col" id='category_dropdown'>
          {% block category_dropdown %}
          <div class="col-sm"><a href="#" class="text-decoration-none text-light">By Category</a></div>
          {% endblock %}
        </div>
        <div class="col " id="status_dropdown">
           <div class="col-sm dropdown">
              <button type="button" class="btn dropdown-toggle text-light" data-bs-toggle="dropdown">By Status </button>
              <ul class="dropdown-menu">
                <li><a href="{% url 'status_view' 'pending' %}" class="dropdown-item"><i class="bi bi-hourglass-split text-danger-emphasis me-2"></i>  Pending</a></li>
                <li><a href="{% url 'status_view' 'completed' %}" class="dropdown-item"><i class="bi bi-check-circle-fill text-success me-2"></i>  Completed</a></li>
              </ul>
            </div>
        </div>
      </div>
    </div>
    {% block content %}
      
    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
