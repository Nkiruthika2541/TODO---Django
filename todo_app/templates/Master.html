<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Todo Application{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        </div>
        <div class="col">
          <div class="col-sm"><a href="{% url 'create' %}" class="text-decoration-none text-light">Create Task</a></div>
        </div>
        <div class="col">
          <div class="col-sm"><a href="#" class="text-decoration-none text-light">Create Category</a></div>
        </div>
      </div>
    </div>
    {% block content %}
      
    {% endblock %}

</html>
